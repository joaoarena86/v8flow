<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>V8Flow | Firebase Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FUNDO PREMIUM */
        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            pointer-events: none;
            opacity: 0.08;
        }
        .grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to right, #00ccff 1px, transparent 1px), linear-gradient(to bottom, #00ccff 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(60px,60px); } }
        .radar-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70%;
            height: 70%;
            transform: translate(-50%,-50%);
            background: radial-gradient(ellipse, rgba(0,200,255,0.12), transparent);
            animation: pulseGlow 6s infinite;
        }
        @keyframes pulseGlow { 0%,100% { opacity: 0.4; transform: translate(-50%,-50%) scale(0.9); } 50% { opacity: 0.8; transform: translate(-50%,-50%) scale(1.05); } }
        .floating-dots { position: absolute; width: 100%; height: 100%; }
        .dot { position: absolute; width: 2px; height: 2px; background: #00ccff; border-radius: 50%; opacity: 0; animation: floatDot 12s linear infinite; }
        @keyframes floatDot { 0% { transform: translateY(100vh) translateX(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-10vh); opacity: 0; } }
        .vignette { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%); }

        .container { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 30px 25px; }
        .card { background: rgba(10,20,40,0.4); backdrop-filter: blur(12px); border-radius: 28px; padding: 28px; border: 1px solid rgba(0,200,255,0.25); transition: 0.3s; }
        .card:hover { border-color: rgba(0,200,255,0.6); transform: translateY(-2px); }
        .input { width: 100%; padding: 14px 18px; background: rgba(10,20,40,0.6); border: 1px solid rgba(0,200,255,0.3); border-radius: 40px; color: white; font-size: 0.9rem; margin-bottom: 15px; transition: 0.3s; }
        .input:focus { outline: none; border-color: #00ccff; box-shadow: 0 0 12px rgba(0,200,255,0.2); }

        /* BOTÕES COM EFEITO VIDRO PREMIUM */
        .btn {
            padding: 12px 28px;
            background: rgba(10,20,40,0.5) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(0,200,255,0.4) !important;
            border-radius: 40px;
            color: #00ccff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: rgba(0,200,255,0.2) !important;
            border-color: #00ccff !important;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0,200,255,0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, rgba(0,204,255,0.7), rgba(255,100,150,0.7)) !important;
            border: none !important;
            color: white;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0,200,255,0.4);
        }
        .btn-danger {
            border-color: rgba(255,100,150,0.5) !important;
            color: #ff6496 !important;
        }
        .btn-danger:hover {
            background: rgba(255,100,150,0.2) !important;
        }

        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 4rem; font-weight: 800; background: linear-gradient(135deg, #00ccff, #ffffff, #ff6496); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -1px; }
        .divider { width: 60px; height: 2px; background: linear-gradient(90deg, #00ccff, #ff6496); margin: 18px auto 0; border-radius: 2px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 40px; }
        .workflow-list { max-height: 300px; overflow-y: auto; }
        .workflow-item { padding: 14px 18px; margin-bottom: 10px; background: rgba(10,20,40,0.3); border: 1px solid rgba(0,200,255,0.2); border-radius: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .workflow-item:hover, .workflow-item.active { border-color: #00ccff; background: rgba(0,200,255,0.1); }
        .step-card { background: rgba(10,20,40,0.3); border: 1px solid rgba(0,200,255,0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .step-card.locked { opacity: 0.5; border-color: rgba(255,100,150,0.3); }
        .step-card.completed { border-color: #00ffaa; background: rgba(0,255,170,0.05); }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .step-badge { background: rgba(0,200,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
        .step-status-select { background: rgba(0,0,0,0.5); border: 1px solid #00ccff; border-radius: 20px; padding: 4px 8px; color: white; }
        .step-title { font-size: 1.1rem; font-weight: 500; margin: 10px 0; }
        .comment-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .comment-list { max-height: 100px; overflow-y: auto; margin-bottom: 10px; font-size: 0.75rem; color: #aaa; }
        .comment-input { width: 70%; padding: 8px; background: rgba(10,20,40,0.6); border: 1px solid rgba(0,200,255,0.3); border-radius: 20px; color: white; }
        .subtasks-list { margin-top: 10px; padding-left: 20px; }
        .subtask-item { font-size: 0.75rem; margin: 5px 0; display: flex; align-items: center; gap: 10px; }
        .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(10,20,40,0.3); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(0,200,255,0.2); }
        .stat-number { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #00ccff, #ff6496); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal .card { max-width: 500px; width: 90%; }
        .hidden { display: none; }
        .chart-container { margin: 20px auto; max-width: 400px; background: rgba(10,20,40,0.3); border: 1px solid rgba(0,200,255,0.3); border-radius: 20px; padding: 15px; }
        .chart-bar-container { width: 100%; height: 40px; background: rgba(255,255,255,0.1); border-radius: 20px; margin: 10px 0; overflow: hidden; }
        .chart-bar { height: 100%; background: linear-gradient(90deg, #00ccff, #ff6496); width: 0%; border-radius: 20px; transition: width 0.5s ease; }
        .connector-line { width: 2px; height: 20px; background: linear-gradient(to bottom, #00ccff, #ff6496); margin: 0 auto 15px auto; }
        .login-card { text-align: center; padding: 40px 30px; max-width: 450px; margin: 80px auto; background: rgba(10,20,40,0.5); backdrop-filter: blur(15px); border-radius: 32px; border: 1px solid rgba(0,200,255,0.4); }
        .login-card h2 { font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, #00ccff, #ffffff, #ff6496); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 40px; }
        .date-time-card { background: rgba(10,20,40,0.3); border: 1px solid rgba(0,200,255,0.3); border-radius: 20px; padding: 8px 18px; display: flex; align-items: center; gap: 12px; }

        @media (max-width:768px){ .grid-2 { grid-template-columns:1fr; } .stats{ grid-template-columns:1fr; } .header h1{ font-size:2rem; } .login-card h2{ font-size:2rem; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: #00ccff; border-radius: 3px; }
    </style>
</head>
<body>

<div class="premium-bg">
    <div class="grid-lines"></div>
    <div class="radar-center"></div>
    <div class="floating-dots" id="dots"></div>
    <div class="vignette"></div>
</div>

<div class="container" id="app">
    <!-- TELA DE LOGIN -->
    <div id="loginScreen">
        <div class="login-card">
            <h2>V8Flow Pro</h2>
            <div id="loginPanel">
                <input type="email" id="loginEmail" class="input" placeholder="E-mail">
                <input type="password" id="loginPassword" class="input" placeholder="Senha">
                <button id="doLogin" class="btn btn-primary">Entrar</button>
                <div style="margin-top:15px;"><span id="showReg" class="btn" style="padding:8px 20px;">Criar Conta</span></div>
            </div>
            <div id="regPanel" class="hidden">
                <input type="text" id="regName" class="input" placeholder="Nome">
                <input type="email" id="regEmail" class="input" placeholder="E-mail">
                <input type="password" id="regPassword" class="input" placeholder="Senha (mínimo 6)">
                <button id="doReg" class="btn btn-primary">Criar Conta</button>
                <div style="margin-top:15px;"><span id="backLogin" class="btn" style="padding:8px 20px;">← Voltar</span></div>
            </div>
            <div id="authMsg" style="margin-top:20px; font-size:0.8rem; color:#ff6496;"></div>
        </div>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="mainScreen" class="hidden">
        <div class="header">
            <h1>V8Flow Pro</h1>
            <div class="divider"></div>
        </div>
        <div class="card">
            <div class="user-bar">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div style="width:45px; height:45px; border-radius:50%; background:linear-gradient(135deg,#00ccff,#ff6496); display:flex; align-items:center; justify-content:center;"><i class="fas fa-user"></i></div>
                    <div><div id="userName" style="font-weight:500;"></div><small style="color:#00ccff;">Premium</small></div>
                    <div class="date-time-card"><i class="far fa-clock"></i><div><div id="currentDate">00/00/0000</div><div id="currentTime">00:00:00</div></div></div>
                </div>
                <div><button id="openConfig" class="btn"><i class="fas fa-cog"></i> Configurações</button> <button id="logoutMain" class="btn">Sair</button></div>
            </div>
            <div class="stats">
                <div class="stat-card"><div class="stat-number" id="statWorkflows">0</div><div>Workflows</div></div>
                <div class="stat-card"><div class="stat-number" id="statProgress">0</div><div>% Completo</div></div>
                <div class="stat-card"><div class="stat-number" id="statCurrent">0</div><div>Etapa Atual</div></div>
            </div>
            <div class="chart-container"><div class="chart-bar-container"><div class="chart-bar" id="progressBarFill"></div></div><div style="text-align:center; margin-top:5px;"><span id="chartPercent">0%</span> completado</div></div>
            <div class="grid-2">
                <div><h3 style="color:#00ccff;">➕ Criar Workflow</h3><input type="text" id="newWfName" class="input" placeholder="Nome"><button id="createWf" class="btn btn-primary">Criar</button></div>
                <div><h3 style="color:#00ccff;">📁 Meus Workflows</h3><div id="workflowsList" class="workflow-list"></div><button id="deleteWf" class="btn btn-danger" style="width:100%; margin-top:15px;">Excluir Workflow</button></div>
            </div>
            <div id="stepsArea" class="hidden">
                <h3 style="color:#00ccff;">📌 Etapas</h3>
                <div id="stepsList"></div>
                <div style="display:flex; gap:12px; margin-top:20px;"><input type="text" id="newStepName" class="input" style="flex:1;" placeholder="Nome da etapa"><input type="date" id="stepDueDate" class="input" style="width:auto;"><button id="addStep" class="btn btn-primary">Adicionar</button></div>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIGURAÇÕES -->
    <div id="configModal" class="modal">
        <div class="card">
            <h2><i class="fas fa-cog"></i> Configurações</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;"><button class="configTab active" data-tab="seg">Segurança</button><button class="configTab" data-tab="perigo">Perigo</button></div>
            <div id="tabSeg">
                <input type="password" id="oldSenha" class="input" placeholder="Senha atual">
                <input type="password" id="newSenha" class="input" placeholder="Nova senha (mínimo 6)">
                <input type="password" id="confSenha" class="input" placeholder="Confirmar">
                <button id="changePass" class="btn btn-primary" style="width:100%;">Alterar Senha</button>
            </div>
            <div id="tabPerigo" class="hidden">
                <button id="deleteAllWf" class="btn btn-danger" style="width:100%; margin:10px 0;">Excluir TODOS Workflows</button>
                <button id="deleteAccount" class="btn btn-danger" style="width:100%;">Excluir Conta</button>
            </div>
            <button id="closeModal" class="btn" style="width:100%; margin-top:25px;">Fechar</button>
        </div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // ========== CONFIGURAÇÃO DO FIREBASE (SUAS CREDENCIAIS) ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCdZD4gh5ww5weYdA4NbTDiLDmvo8g8wt8",
        authDomain: "v8flow-36a44.firebaseapp.com",
        projectId: "v8flow-36a44",
        storageBucket: "v8flow-36a44.firebasestorage.app",
        messagingSenderId: "1080405965158",
        appId: "1:1080405965158:web:5a0ec9bc6ce365a50270a7"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentWorkflowId = null;
    let currentWorkflows = [];

    // Elementos
    const loginScreen = document.getElementById('loginScreen');
    const mainScreen = document.getElementById('mainScreen');
    const workflowsList = document.getElementById('workflowsList');
    const stepsArea = document.getElementById('stepsArea');
    const stepsList = document.getElementById('stepsList');
    const userNameSpan = document.getElementById('userName');

    // Data e hora
    function updateDateTime() {
        const now = new Date();
        document.getElementById('currentDate').innerText = now.toLocaleDateString('pt-BR');
        document.getElementById('currentTime').innerText = now.toLocaleTimeString('pt-BR');
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Partículas
    for(let i=0;i<80;i++){ 
        let d = document.createElement('div'); 
        d.className = 'dot'; 
        d.style.left = Math.random()*100+'%'; 
        d.style.animationDelay = Math.random()*12+'s'; 
        d.style.animationDuration = 8+Math.random()*8+'s'; 
        document.getElementById('dots').appendChild(d); 
    }

    // ========== FUNÇÕES DE INTERFACE ==========
    function showLogin() { loginScreen.classList.remove('hidden'); mainScreen.classList.add('hidden'); }
    function showMain() { loginScreen.classList.add('hidden'); mainScreen.classList.remove('hidden'); }

    // ========== AUTENTICAÇÃO ==========
    document.getElementById('doLogin').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
            document.getElementById('authMsg').innerHTML = '✅ Login realizado!';
        } catch(error) {
            document.getElementById('authMsg').innerHTML = '❌ ' + error.message;
        }
    };

    document.getElementById('doReg').onclick = async () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.updateProfile({ displayName: name });
            await db.collection('users').doc(cred.user.uid).set({ name: name, email: email });
            document.getElementById('authMsg').innerHTML = '✅ Conta criada! Faça login.';
            document.getElementById('regPanel').classList.add('hidden');
            document.getElementById('loginPanel').classList.remove('hidden');
        } catch(error) {
            document.getElementById('authMsg').innerHTML = '❌ ' + error.message;
        }
    };

    document.getElementById('showReg').onclick = () => {
        document.getElementById('loginPanel').classList.add('hidden');
        document.getElementById('regPanel').classList.remove('hidden');
        document.getElementById('authMsg').innerHTML = '';
    };

    document.getElementById('backLogin').onclick = () => {
        document.getElementById('regPanel').classList.add('hidden');
        document.getElementById('loginPanel').classList.remove('hidden');
        document.getElementById('authMsg').innerHTML = '';
    };

    document.getElementById('logoutMain').onclick = async () => {
        await auth.signOut();
        showLogin();
    };

    // ========== CARREGAR WORKFLOWS ==========
    async function loadWorkflows() {
        if(!currentUser) return;
        const snapshot = await db.collection('workflows')
            .where('userId', '==', currentUser.uid)
            .orderBy('createdAt', 'desc')
            .get();
        
        currentWorkflows = [];
        workflowsList.innerHTML = '';
        
        if(snapshot.empty) {
            workflowsList.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum workflow</div>';
            updateStats();
            return;
        }
        
        snapshot.forEach(doc => {
            const data = doc.data();
            currentWorkflows.push({ id: doc.id, ...data });
            const div = document.createElement('div');
            div.className = 'workflow-item';
            if(currentWorkflowId === doc.id) div.classList.add('active');
            div.innerHTML = `<span>${escapeHtml(data.name)}</span><i class="fas fa-chevron-right"></i>`;
            div.onclick = () => selectWorkflow(doc.id, data);
            workflowsList.appendChild(div);
        });
        updateStats();
    }

    async function selectWorkflow(id, data) {
        currentWorkflowId = id;
        stepsArea.classList.remove('hidden');
        await renderSteps(data.steps || [], data.currentIdx || 0);
        updateStats();
        document.querySelectorAll('.workflow-item').forEach(el => el.classList.remove('active'));
        const items = document.querySelectorAll('.workflow-item');
        for(let item of items) {
            if(item.innerHTML.includes(data.name)) item.classList.add('active');
        }
    }

    async function renderSteps(steps, currentIdx) {
        if(!steps.length) {
            stepsList.innerHTML = '<div style="text-align:center; padding:40px;">Nenhuma etapa. Adicione a primeira!</div>';
            return;
        }
        
        stepsList.innerHTML = '';
        steps.forEach((step, idx) => {
            const isLocked = idx > currentIdx;
            const isCompleted = step.status === 'completed';
            const isCurrent = idx === currentIdx && !isCompleted;
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step-card';
            if(isLocked) stepDiv.classList.add('locked');
            if(isCompleted) stepDiv.classList.add('completed');
            
            const statusOptions = `<select class="step-status-select" data-idx="${idx}">
                <option value="pending" ${step.status==='pending'?'selected':''}>Pendente</option>
                <option value="progress" ${step.status==='progress'?'selected':''}>Em Andamento</option>
                <option value="completed" ${step.status==='completed'?'selected':''}>Concluída</option>
            </select>`;
            
            const dueClass = (step.dueDate && new Date(step.dueDate) < new Date() && step.status !== 'completed') ? 'style="color:#ff6496;"' : '';
            
            stepDiv.innerHTML = `
                <div class="step-header">
                    <span class="step-badge">${isCompleted ? '✅' : (isCurrent ? '▶' : '🔒')} Etapa ${idx+1}</span>
                    ${statusOptions}
                </div>
                <div class="step-title">${escapeHtml(step.name)}</div>
                <div class="step-date"><i class="far fa-calendar-alt"></i> Prazo: <span ${dueClass}>${step.dueDate || 'Sem data'}</span></div>
                <div class="subtasks-list"><strong>Sub-etapas:</strong><div id="subtasks-${idx}"></div></div>
                <div class="comment-section"><strong>Comentários:</strong><div id="comments-${idx}" class="comment-list"></div></div>
            `;
            stepsList.appendChild(stepDiv);
            if(idx < steps.length-1) { let line = document.createElement('div'); line.className='connector-line'; stepsList.appendChild(line); }
        });
        
        document.querySelectorAll('.step-status-select').forEach(select => {
            select.onchange = async (e) => {
                const idx = parseInt(select.dataset.idx);
                await updateStepStatus(idx, select.value);
            };
        });
    }

    async function updateStepStatus(stepIdx, newStatus) {
        const doc = await db.collection('workflows').doc(currentWorkflowId).get();
        const data = doc.data();
        let steps = data.steps || [];
        let currentIdx = data.currentIdx || 0;
        
        steps[stepIdx].status = newStatus;
        if(newStatus === 'completed' && stepIdx === currentIdx) {
            currentIdx++;
            if(currentIdx >= steps.length) currentIdx = steps.length;
        }
        
        await db.collection('workflows').doc(currentWorkflowId).update({
            steps: steps,
            currentIdx: currentIdx
        });
        
        await renderSteps(steps, currentIdx);
        updateStats();
    }

    function updateStats() {
        if(!currentWorkflowId) {
            document.getElementById('statWorkflows').innerText = currentWorkflows.length;
            document.getElementById('statProgress').innerText = '0';
            document.getElementById('statCurrent').innerText = '0';
            document.getElementById('chartPercent').innerText = '0%';
            document.getElementById('progressBarFill').style.width = '0%';
            return;
        }
        
        let steps = [];
        let currentIdx = 0;
        for(let wf of currentWorkflows) {
            if(wf.id === currentWorkflowId) {
                steps = wf.steps || [];
                currentIdx = wf.currentIdx || 0;
                break;
            }
        }
        
        const completed = steps.filter(s => s.status === 'completed').length;
        const percent = steps.length ? Math.floor((completed/steps.length)*100) : 0;
        
        document.getElementById('statWorkflows').innerText = currentWorkflows.length;
        document.getElementById('statProgress').innerText = percent;
        document.getElementById('statCurrent').innerText = currentIdx+1;
        document.getElementById('chartPercent').innerText = percent+'%';
        document.getElementById('progressBarFill').style.width = percent+'%';
    }

    // Criar workflow
    document.getElementById('createWf').onclick = async () => {
        const name = document.getElementById('newWfName').value.trim();
        if(!name) { alert('Digite um nome'); return; }
        
        await db.collection('workflows').add({
            userId: currentUser.uid,
            name: name,
            steps: [],
            currentIdx: 0,
            createdAt: new Date()
        });
        
        document.getElementById('newWfName').value = '';
        await loadWorkflows();
    };

    // Adicionar etapa
    document.getElementById('addStep').onclick = async () => {
        const stepName = document.getElementById('newStepName').value.trim();
        const dueDate = document.getElementById('stepDueDate').value;
        if(!stepName) { alert('Digite o nome da etapa'); return; }
        if(!currentWorkflowId) { alert('Selecione um workflow'); return; }
        
        const doc = await db.collection('workflows').doc(currentWorkflowId).get();
        const data = doc.data();
        let steps = data.steps || [];
        let currentIdx = data.currentIdx || 0;
        
        steps.push({ name: stepName, dueDate: dueDate, status: 'pending' });
        
        await db.collection('workflows').doc(currentWorkflowId).update({
            steps: steps,
            currentIdx: currentIdx
        });
        
        document.getElementById('newStepName').value = '';
        document.getElementById('stepDueDate').value = '';
        await renderSteps(steps, currentIdx);
        updateStats();
    };

    // Excluir workflow
    document.getElementById('deleteWf').onclick = async () => {
        if(!currentWorkflowId) { alert('Selecione um workflow'); return; }
        if(confirm('Excluir este workflow permanentemente?')) {
            await db.collection('workflows').doc(currentWorkflowId).delete();
            currentWorkflowId = null;
            stepsArea.classList.add('hidden');
            await loadWorkflows();
            updateStats();
        }
    };

    // Excluir todos workflows
    document.getElementById('deleteAllWf').onclick = async () => {
        if(confirm('Excluir TODOS os workflows permanentemente?')) {
            for(let wf of currentWorkflows) {
                await db.collection('workflows').doc(wf.id).delete();
            }
            currentWorkflowId = null;
            stepsArea.classList.add('hidden');
            await loadWorkflows();
            updateStats();
            alert('Todos os workflows foram excluídos');
        }
    };

    // Excluir conta
    document.getElementById('deleteAccount').onclick = async () => {
        if(confirm('Excluir sua conta e TODOS os dados permanentemente?')) {
            for(let wf of currentWorkflows) {
                await db.collection('workflows').doc(wf.id).delete();
            }
            await db.collection('users').doc(currentUser.uid).delete();
            await currentUser.delete();
            alert('Conta excluída');
            showLogin();
        }
    };

    // Alterar senha
    document.getElementById('changePass').onclick = async () => {
        const oldPass = document.getElementById('oldSenha').value;
        const newPass = document.getElementById('newSenha').value;
        const confirmPass = document.getElementById('confSenha').value;
        
        if(newPass.length < 6) { alert('Nova senha deve ter no mínimo 6 caracteres'); return; }
        if(newPass !== confirmPass) { alert('Senhas não conferem'); return; }
        
        try {
            const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPass);
            await currentUser.reauthenticateWithCredential(credential);
            await currentUser.updatePassword(newPass);
            alert('Senha alterada com sucesso!');
            document.getElementById('oldSenha').value = '';
            document.getElementById('newSenha').value = '';
            document.getElementById('confSenha').value = '';
        } catch(error) {
            alert('Erro: ' + error.message);
        }
    };

    // Modal configurações
    document.getElementById('openConfig').onclick = () => {
        document.getElementById('configModal').style.display = 'flex';
    };
    document.getElementById('closeModal').onclick = () => {
        document.getElementById('configModal').style.display = 'none';
    };
    document.querySelectorAll('.configTab').forEach(t => {
        t.onclick = () => {
            document.querySelectorAll('.configTab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            document.getElementById('tabSeg').classList.toggle('hidden', t.dataset.tab !== 'seg');
            document.getElementById('tabPerigo').classList.toggle('hidden', t.dataset.tab !== 'perigo');
        };
    });
    window.onclick = (e) => { if(e.target === document.getElementById('configModal')) document.getElementById('configModal').style.display = 'none'; };

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    // Monitorar usuário logado
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const userDoc = await db.collection('users').doc(user.uid).get();
            const userName = userDoc.data()?.name || user.email;
            userNameSpan.innerText = userName;
            await loadWorkflows();
            stepsArea.classList.add('hidden');
            currentWorkflowId = null;
            showMain();
            updateDateTime();
        } else {
            currentUser = null;
            showLogin();
        }
    });
</script>
</body>
</html>
