<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>V8Flow | Workflow Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* EFEITOS TECNOLÓGICOS */
        .effects-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .tech-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 51, 102, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 51, 102, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPulse 6s ease-in-out infinite;
        }
        
        @keyframes gridPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        .radar-wave {
            position: absolute;
            border: 2px solid rgba(255, 51, 102, 0.5);
            border-radius: 50%;
            animation: radarPulse 4s ease-out infinite;
        }
        
        .radar-wave:nth-child(1) { top: 15%; left: 10%; width: 80px; height: 80px; animation-delay: 0s; }
        .radar-wave:nth-child(2) { top: 20%; left: 80%; width: 100px; height: 100px; animation-delay: 1s; }
        .radar-wave:nth-child(3) { top: 55%; left: 15%; width: 120px; height: 120px; animation-delay: 2s; border-color: rgba(255, 102, 0, 0.4); }
        .radar-wave:nth-child(4) { top: 65%; left: 70%; width: 90px; height: 90px; animation-delay: 0.5s; }
        .radar-wave:nth-child(5) { top: 40%; left: 45%; width: 150px; height: 150px; animation-delay: 1.5s; }
        .radar-wave:nth-child(6) { top: 80%; left: 40%; width: 110px; height: 110px; animation-delay: 2.5s; }
        .radar-wave:nth-child(7) { top: 10%; left: 45%; width: 200px; height: 200px; animation-delay: 0.8s; border-color: rgba(255, 102, 0, 0.3); }
        .radar-wave:nth-child(8) { top: 45%; left: 20%; width: 70px; height: 70px; animation-delay: 1.8s; }
        .radar-wave:nth-child(9) { top: 75%; left: 85%; width: 130px; height: 130px; animation-delay: 3s; }
        .radar-wave:nth-child(10) { top: 30%; left: 60%; width: 60px; height: 60px; animation-delay: 0.3s; }
        
        @keyframes radarPulse { 0% { transform: scale(0.3); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }
        
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255, 51, 102, 0.7), rgba(255, 102, 0, 0.7), transparent);
            animation: scanMove 5s linear infinite;
        }
        
        @keyframes scanMove { 0% { top: -5%; } 100% { top: 105%; } }
        
        .tech-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70%;
            height: 70%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse, rgba(255, 51, 102, 0.1) 0%, transparent 70%);
            animation: glowPulse 6s ease-in-out infinite;
        }
        
        @keyframes glowPulse { 0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); } }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: radial-gradient(circle, #ff3366, #ff6600);
            border-radius: 50%;
            opacity: 0.6;
            animation: floatParticle 18s linear infinite;
        }
        
        @keyframes floatParticle { 0% { transform: translateY(100vh) translateX(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-10vh) translateX(30px); opacity: 0; } }
        
        .particle:nth-child(1) { left: 5%; animation-duration: 14s; }
        .particle:nth-child(2) { left: 15%; animation-duration: 20s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 25%; animation-duration: 16s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 35%; animation-duration: 22s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 45%; animation-duration: 13s; animation-delay: 6s; }
        .particle:nth-child(6) { left: 55%; animation-duration: 19s; animation-delay: 3s; }
        .particle:nth-child(7) { left: 65%; animation-duration: 15s; animation-delay: 7s; }
        .particle:nth-child(8) { left: 75%; animation-duration: 21s; animation-delay: 0s; }
        .particle:nth-child(9) { left: 85%; animation-duration: 17s; animation-delay: 5s; }
        .particle:nth-child(10) { left: 95%; animation-duration: 12s; animation-delay: 8s; }
        
        #neuralCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        :root {
            --primary: #ff3366;
            --secondary: #ff6600;
        }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 2; }
        
        .card {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(255, 51, 102, 0.15);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        
        .header-card {
            text-align: center;
            margin-bottom: 50px;
        }
        .header-card h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            margin: 20px auto 0;
            border-radius: 3px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 20px 32px;
            text-align: center;
            border: 1px solid rgba(255, 51, 102, 0.2);
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .input-premium {
            width: 100%;
            padding: 14px 18px;
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid #1f1f1f;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .input-premium:focus { outline: none; border-color: var(--primary); }
        
        .btn-premium {
            padding: 12px 28px;
            background: transparent;
            border: 1px solid rgba(255, 51, 102, 0.5);
            border-radius: 40px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-premium:hover {
            background: rgba(255, 51, 102, 0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
        }
        .btn-danger {
            border-color: rgba(255, 51, 102, 0.5);
            color: #ff3366;
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .workflow-list { max-height: 300px; overflow-y: auto; }
        .workflow-item {
            padding: 14px 18px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 51, 102, 0.2);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .workflow-item:hover, .workflow-item.active { border-color: var(--primary); background: rgba(255, 51, 102, 0.1); }
        
        .step-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 51, 102, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .step-card.completed { opacity: 0.5; text-decoration: line-through; }
        
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px;
            width: 400px;
            max-width: 90%;
            border: 1px solid rgba(255, 51, 102, 0.3);
        }
        
        .hidden { display: none; }
        
        @media (max-width: 700px) {
            .container { padding: 20px 16px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="effects-fullscreen">
    <div class="tech-grid"></div>
    <div class="radar-wave"></div>
    <div class="radar-wave"></div>
    <div class="radar-wave"></div>
    <div class="radar-wave"></div>
    <div class="radar-wave"></div>
    <div class="radar-wave"></div>
    <div class="radar-wave"></div>

    <div class="particle"></div>

<div class="container" id="app">
    <!-- LOGIN/LOCALSTORAGE -->
    <div id="loginScreen">
        <div style="max-width: 450px; margin: 80px auto;">
            <div class="card" style="text-align: center;">
                <h1 style="background: linear-gradient(135deg, #ff3366, #ff6600); -webkit-background-clip: text; background-clip: text; color: transparent;">V8Flow</h1>
                <p style="margin-bottom: 30px;">Workflow Manager</p>
                
                <div id="loginPanel">
                    <input type="text" id="loginUser" class="input-premium" placeholder="Usuário">

                    <button id="btnLogin" class="btn-premium btn-primary">Entrar</button>

        <div class="card">

            <div class="stats">

                    <h3 style="color:#ff3366;">➕ Criar Workflow</h3>

                    <button id="createWorkflowBtn" class="btn-premium btn-primary">Criar</button>

            <div id="stepsCard" class="hidden">

                    <input type="text" id="newStepName" class="input-premium" style="flex:1;" placeholder="Nome da etapa">

            <button id="deleteAllWorkflowsBtn" class="btn-premium btn-danger" style="width:100%; margin-bottom:10px;">Excluir TODOS Workflows</button>

        </div>

<script>
    // REDE NEURAL
    const canvas = document.getElementById('neuralCanvas');
    let ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    let nodes = [];
    
    function initNodes() {
        nodes = [];
        for (let i = 0; i < 40; i++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                radius: Math.random() * 3 + 2
            });
        }
    }
    
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initNodes();
        drawNeural();
    }
    
    function drawNeural() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const dx = nodes[i].x - nodes[j].x;
                const dy = nodes[i].y - nodes[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[j].x, nodes[j].y);
                    const opacity = (1 - dist / 180) * 0.25;
                    ctx.strokeStyle = `rgba(255, 51, 102, ${opacity})`;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
            }
        }
        for (const node of nodes) {
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 51, 102, 0.6)`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 102, 0, 0.8)`;
            ctx.fill();
        }
        for (const node of nodes) {
            node.x += node.vx;
            node.y += node.vy;
            if (node.x < 0) node.x = width;
            if (node.x > width) node.x = 0;
            if (node.y < 0) node.y = height;
            if (node.y > height) node.y = 0;
        }
        requestAnimationFrame(drawNeural);
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ========== LOCALSTORAGE ==========
    let currentUser = null;
    let users = {};
    let workflows = [];
    let selectedWorkflowId = null;

    function loadData() {
        const savedUsers = localStorage.getItem('v8flow_users');
        if (savedUsers) users = JSON.parse(savedUsers);
        else users = {};
    }
    function saveUsers() { localStorage.setItem('v8flow_users', JSON.stringify(users)); }
    
    function saveWorkflows() {
        if (currentUser) {
            localStorage.setItem(`v8flow_workflows_${currentUser}`, JSON.stringify(workflows));
        }
    }
    
    function loadWorkflows() {
        if (currentUser) {
            const saved = localStorage.getItem(`v8flow_workflows_${currentUser}`);
            if (saved) workflows = JSON.parse(saved);
            else workflows = [];
        }
        renderWorkflows();
        updateStats();
    }

    function renderWorkflows() {
        const container = document.getElementById('workflowsList');
        if (!workflows.length) { container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum workflow</div>'; return; }
        container.innerHTML = '';
        workflows.forEach((wf, idx) => {
            const div = document.createElement('div');
            div.className = 'workflow-item';
            if (selectedWorkflowId === idx) div.classList.add('active');
            div.innerHTML = `<span>${wf.name}</span> <span>${wf.steps?.length || 0} etapas</span>`;
            div.onclick = () => selectWorkflow(idx);
            container.appendChild(div);
        });
    }

    function selectWorkflow(idx) {
        selectedWorkflowId = idx;
        const wf = workflows[idx];
        if (wf) {
            document.getElementById('stepsCard').classList.remove('hidden');
            renderSteps(wf.steps || []);
        }
        renderWorkflows();
        updateStats();
    }

    function renderSteps(steps) {
        const container = document.getElementById('stepsList');
        if (!steps.length) { container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhuma etapa</div>'; return; }
        container.innerHTML = '';
        steps.forEach((step, stepIdx) => {
            const div = document.createElement('div');
            div.className = 'step-card';
            if (step.completed) div.classList.add('completed');
            div.innerHTML = `
                <span>${stepIdx+1}. ${step.name}</span>
                <div>
                    <button class="btn-premium" style="padding:5px 12px; margin-right:5px;" onclick="toggleStep(${selectedWorkflowId}, ${stepIdx})">${step.completed ? 'Reabrir' : 'Concluir'}</button>
                    <button class="btn-premium btn-danger" style="padding:5px 12px;" onclick="deleteStep(${selectedWorkflowId}, ${stepIdx})">Excluir</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    window.toggleStep = (workflowIdx, stepIdx) => {
        workflows[workflowIdx].steps[stepIdx].completed = !workflows[workflowIdx].steps[stepIdx].completed;
        saveWorkflows();
        renderSteps(workflows[workflowIdx].steps);
        updateStats();
    };

    window.deleteStep = (workflowIdx, stepIdx) => {
        workflows[workflowIdx].steps.splice(stepIdx, 1);
        saveWorkflows();
        renderSteps(workflows[workflowIdx].steps);
        updateStats();
    };

    function addStep(name) {
        if (selectedWorkflowId === null) { alert('Selecione um workflow'); return false; }
        if (!workflows[selectedWorkflowId].steps) workflows[selectedWorkflowId].steps = [];
        workflows[selectedWorkflowId].steps.push({ name, completed: false });
        saveWorkflows();
        renderSteps(workflows[selectedWorkflowId].steps);
        updateStats();
        return true;
    }

    function createWorkflow(name) {
        workflows.push({ name, steps: [] });
        saveWorkflows();
        loadWorkflows();
    }

    function deleteWorkflow() {
        if (selectedWorkflowId === null) { alert('Selecione um workflow'); return; }
        if (!confirm('Excluir este workflow?')) return;
        workflows.splice(selectedWorkflowId, 1);
        selectedWorkflowId = null;
        document.getElementById('stepsCard').classList.add('hidden');
        saveWorkflows();
        loadWorkflows();
    }

    function deleteAllWorkflows() {
        if (!confirm('Excluir TODOS os workflows?')) return;
        workflows = [];
        selectedWorkflowId = null;
        document.getElementById('stepsCard').classList.add('hidden');
        saveWorkflows();
        loadWorkflows();
    }

    function deleteAccount() {
        if (!confirm('Excluir sua conta e TODOS os dados?')) return;
        delete users[currentUser];
        saveUsers();
        logout();
    }

    function changePassword(oldPwd, newPwd, confirmPwd) {
        if (newPwd.length < 4) { alert('Nova senha mínimo 4'); return false; }
        if (newPwd !== confirmPwd) { alert('Senhas não conferem'); return false; }
        if (users[currentUser].password !== oldPwd) { alert('Senha atual incorreta'); return false; }
        users[currentUser].password = newPwd;
        saveUsers();
        alert('Senha alterada!');
        return true;
    }

    function updateStats() {
        document.getElementById('totalWorkflows').innerText = workflows.length;
        if (selectedWorkflowId !== null && workflows[selectedWorkflowId] && workflows[selectedWorkflowId].steps?.length) {
            const steps = workflows[selectedWorkflowId].steps;
            const completed = steps.filter(s => s.completed).length;
            const percent = Math.floor((completed / steps.length) * 100);
            document.getElementById('totalProgress').innerText = percent;
        } else {
            document.getElementById('totalProgress').innerText = '0';
        }
    }

    // AUTH LOCAL
    function register(user, pass) {
        if (users[user]) { alert('Usuário já existe'); return false; }
        users[user] = { password: pass };
        saveUsers();
        alert('Conta criada! Faça login.');
        return true;
    }

    function login(user, pass) {
        if (!users[user] || users[user].password !== pass) { alert('Usuário ou senha inválidos'); return false; }
        currentUser = user;
        document.getElementById('userName').innerHTML = user;
        loadWorkflows();
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('stepsCard').classList.add('hidden');
        selectedWorkflowId = null;
        return true;
    }

    function logout() {
        currentUser = null;
        workflows = [];
        selectedWorkflowId = null;
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('stepsCard').classList.add('hidden');
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
    }

    // EVENTOS
    document.getElementById('btnLogin').onclick = () => {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (user && pass) login(user, pass);
        else alert('Preencha todos os campos');
    };
    document.getElementById('btnReg').onclick = () => {
        const user = document.getElementById('regUser').value.trim();
        const pass = document.getElementById('regPass').value;
        if (user && pass && pass.length >= 4) register(user, pass);
        else alert('Usuário e senha (mínimo 4) obrigatórios');
    };
    document.getElementById('showReg').onclick = () => {
        document.getElementById('loginPanel').classList.add('hidden');
        document.getElementById('regPanel').classList.remove('hidden');
        document.getElementById('authMsg').innerHTML = '';
    };
    document.getElementById('backLogin').onclick = () => {
        document.getElementById('regPanel').classList.add('hidden');
        document.getElementById('loginPanel').classList.remove('hidden');
        document.getElementById('authMsg').innerHTML = '';
    };
    document.getElementById('logoutBtn').onclick = () => { logout(); };
    document.getElementById('createWorkflowBtn').onclick = () => {
        const name = document.getElementById('newWorkflowName').value.trim();
        if (!name) { alert('Digite um nome'); return; }
        createWorkflow(name);
        document.getElementById('newWorkflowName').value = '';
    };
    document.getElementById('addStepBtn').onclick = () => {
        const name = document.getElementById('newStepName').value.trim();
        if (!name) { alert('Digite o nome da etapa'); return; }
        addStep(name);
        document.getElementById('newStepName').value = '';
    };
    document.getElementById('deleteWorkflowBtn').onclick = () => { deleteWorkflow(); };
    document.getElementById('deleteAllWorkflowsBtn').onclick = () => { deleteAllWorkflows(); };
    document.getElementById('deleteAccountBtn').onclick = () => { deleteAccount(); };
    document.getElementById('changePasswordBtn').onclick = () => {
        const old = document.getElementById('oldPassword').value;
        const newPwd = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        changePassword(old, newPwd, confirm);
        document.getElementById('oldPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
    };
    document.getElementById('openSettings').onclick = () => { document.getElementById('settingsModal').style.display = 'flex'; };
    document.getElementById('closeModal').onclick = () => { document.getElementById('settingsModal').style.display = 'none'; };
    window.onclick = (e) => { if (e.target === document.getElementById('settingsModal')) document.getElementById('settingsModal').style.display = 'none'; };

    loadData();
</script>
</body>
</html>
