<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>V8Flow | Workflow Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at 20% 30%, #0a0a2a, #000); opacity: 0.9; }
        .container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 30px; }
        .card { background: rgba(10,20,40,0.4); backdrop-filter: blur(12px); border-radius: 28px; padding: 28px; border: 1px solid rgba(0,200,255,0.3); margin-bottom: 25px; }
        .input { width: 100%; padding: 14px; background: rgba(10,20,40,0.6); border: 1px solid rgba(0,200,255,0.3); border-radius: 40px; color: white; margin-bottom: 15px; }
        .btn { padding: 12px 28px; background: transparent; border: 1px solid rgba(0,200,255,0.5); border-radius: 40px; color: #00ccff; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #00ccff, #ff6496); border: none; color: white; }
        .btn-danger { border-color: #ff6496; color: #ff6496; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .workflow-item { padding: 15px; background: rgba(10,20,40,0.3); border: 1px solid rgba(0,200,255,0.2); border-radius: 16px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; }
        .workflow-item.active { border-color: #00ccff; background: rgba(0,200,255,0.15); }
        .step-card { background: rgba(10,20,40,0.3); border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 3px solid #00ccff; }
        .step-card.locked { opacity: 0.5; border-left-color: #ff6496; }
        .step-card.completed { border-left-color: #00ffaa; background: rgba(0,255,170,0.05); }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .step-status { background: rgba(0,200,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
        .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 30px; text-align: center; }
        .stat-card { background: rgba(10,20,40,0.3); border-radius: 20px; padding: 20px; }
        .stat-number { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #00ccff, #ff6496); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal .card { max-width: 450px; width: 90%; }
        .hidden { display: none; }
        .login-card { max-width: 450px; margin: 80px auto; text-align: center; }
        .progress-bar { height: 40px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00ccff, #ff6496); width: 0%; transition: width 0.5s; }
        @media (max-width:768px){ .grid-2 { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="container" id="app">

    <!-- LOGIN -->
    <div id="loginView">
        <div class="login-card card">
            <h2 style="background: linear-gradient(135deg,#00ccff,#ff6496); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:30px;">V8Flow Pro</h2>
            <div id="loginPanel">
                <input type="email" id="loginEmail" class="input" placeholder="E-mail">
                <input type="password" id="loginPass" class="input" placeholder="Senha">
                <button id="btnLogin" class="btn btn-primary">Entrar</button>
                <div style="margin-top:15px;"><span id="showReg" class="btn" style="padding:8px 20px;">Criar Conta</span></div>
            </div>
            <div id="regPanel" class="hidden">
                <input type="text" id="regName" class="input" placeholder="Nome">
                <input type="email" id="regEmail" class="input" placeholder="E-mail">
                <input type="password" id="regPass" class="input" placeholder="Senha (mínimo 6)">
                <button id="btnReg" class="btn btn-primary">Criar Conta</button>
                <div style="margin-top:15px;"><span id="backLogin" class="btn" style="padding:8px 20px;">← Voltar</span></div>
            </div>
            <div id="authMsg" style="margin-top:20px; font-size:0.8rem; color:#ff6496;"></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="mainView" class="hidden">
        <div class="card">
            <div class="user-bar">
                <div><i class="fas fa-user-circle" style="font-size:2rem;"></i> <span id="userName"></span></div>
                <div><button id="openSettingsBtn" class="btn"><i class="fas fa-cog"></i> Configurações</button> <button id="logoutBtn" class="btn">Sair</button></div>
            </div>
            <div class="stats">
                <div class="stat-card"><div class="stat-number" id="totalWorkflows">0</div><div>Workflows</div></div>
                <div class="stat-card"><div class="stat-number" id="totalProgress">0</div><div>% Completo</div></div>
                <div class="stat-card"><div class="stat-number" id="currentStep">0</div><div>Etapa Atual</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3 style="color:#00ccff;">➕ Criar Workflow</h3>
                <input type="text" id="newWorkflowName" class="input" placeholder="Nome do workflow">
                <button id="createWorkflowBtn" class="btn btn-primary">Criar</button>
            </div>
            <div class="card">
                <h3 style="color:#00ccff;">📁 Meus Workflows</h3>
                <div id="workflowsList"></div>
                <button id="deleteWorkflowBtn" class="btn btn-danger" style="width:100%; margin-top:15px;">Excluir Workflow Selecionado</button>
            </div>
        </div>

        <div id="stepsSection" class="card hidden">
            <h3 style="color:#00ccff;">📌 Etapas</h3>
            <div id="stepsList"></div>
            <div style="display:flex; gap:12px; margin-top:20px;">
                <input type="text" id="newStepName" class="input" style="flex:1; margin:0;" placeholder="Nome da etapa">
                <input type="date" id="stepDate" class="input" style="width:auto; margin:0;">
                <button id="addStepBtn" class="btn btn-primary">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal">
        <div class="card">
            <h3 style="color:#00ccff;">⚙️ Configurações</h3>
            <input type="password" id="oldPassword" class="input" placeholder="Senha atual">
            <input type="password" id="newPassword" class="input" placeholder="Nova senha">
            <input type="password" id="confirmPassword" class="input" placeholder="Confirmar nova senha">
            <button id="changePasswordBtn" class="btn btn-primary" style="width:100%;">Alterar Senha</button>
            <hr style="margin: 20px 0; border-color: rgba(0,200,255,0.2);">
            <button id="deleteAllWorkflowsBtn" class="btn btn-danger" style="width:100%; margin-bottom:10px;">Excluir TODOS Workflows</button>
            <button id="deleteAccountBtn" class="btn btn-danger" style="width:100%;">Excluir Minha Conta</button>
            <button id="closeSettingsBtn" class="btn" style="width:100%; margin-top:20px;">Fechar</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // CONFIGURAÇÃO DO FIREBASE (SUA)
    const firebaseConfig = {
        apiKey: "AIzaSyCdZD4gh5ww5weYdA4NbTDiLDmvo8g8wt8",
        authDomain: "v8flow-36a44.firebaseapp.com",
        projectId: "v8flow-36a44",
        storageBucket: "v8flow-36a44.firebasestorage.app",
        messagingSenderId: "1080405965158",
        appId: "1:1080405965158:web:5a0ec9bc6ce365a50270a7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentWorkflowId = null;
    let workflows = [];

    // ========== ELEMENTOS ==========
    const loginView = document.getElementById('loginView');
    const mainView = document.getElementById('mainView');
    const workflowsList = document.getElementById('workflowsList');
    const stepsSection = document.getElementById('stepsSection');
    const stepsList = document.getElementById('stepsList');
    const userNameSpan = document.getElementById('userName');

    // ========== HELPERS ==========
    function showMsg(el, msg, isError=true) { 
        el.innerHTML = msg; 
        el.style.color = isError ? '#ff6496' : '#00ffaa';
        setTimeout(() => el.innerHTML = '', 3000); 
    }

    function updateStats() {
        if(!currentWorkflowId) {
            document.getElementById('totalWorkflows').innerText = workflows.length;
            document.getElementById('totalProgress').innerText = '0';
            document.getElementById('currentStep').innerText = '0';
            document.getElementById('progressFill').style.width = '0%';
            return;
        }
        const wf = workflows.find(w => w.id === currentWorkflowId);
        if(wf) {
            const steps = wf.steps || [];
            const completed = steps.filter(s => s.status === 'completed').length;
            const percent = steps.length ? Math.floor((completed/steps.length)*100) : 0;
            const currentIdx = wf.currentIdx || 0;
            document.getElementById('totalWorkflows').innerText = workflows.length;
            document.getElementById('totalProgress').innerText = percent;
            document.getElementById('currentStep').innerText = currentIdx+1;
            document.getElementById('progressFill').style.width = percent+'%';
        }
    }

    function renderWorkflows() {
        if(!workflows.length) {
            workflowsList.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum workflow</div>';
            updateStats();
            return;
        }
        workflowsList.innerHTML = '';
        workflows.forEach(wf => {
            const div = document.createElement('div');
            div.className = 'workflow-item';
            if(wf.id === currentWorkflowId) div.classList.add('active');
            div.innerHTML = `<span>${escapeHtml(wf.name)}</span><i class="fas fa-chevron-right"></i>`;
            div.onclick = () => selectWorkflow(wf.id);
            workflowsList.appendChild(div);
        });
        updateStats();
    }

    async function selectWorkflow(id) {
        currentWorkflowId = id;
        const wf = workflows.find(w => w.id === id);
        if(wf) {
            stepsSection.classList.remove('hidden');
            renderSteps(wf.steps || [], wf.currentIdx || 0);
        }
        renderWorkflows();
    }

    function renderSteps(steps, currentIdx) {
        if(!steps.length) {
            stepsList.innerHTML = '<div style="text-align:center; padding:40px;">Nenhuma etapa. Adicione a primeira!</div>';
            return;
        }
        stepsList.innerHTML = '';
        steps.forEach((step, idx) => {
            const isLocked = idx > currentIdx;
            const isCompleted = step.status === 'completed';
            const isCurrent = idx === currentIdx && !isCompleted;
            const div = document.createElement('div');
            div.className = 'step-card';
            if(isLocked) div.classList.add('locked');
            if(isCompleted) div.classList.add('completed');
            
            const statusSelect = `<select class="step-status" data-idx="${idx}" style="background:rgba(0,0,0,0.5); border:1px solid #00ccff; border-radius:20px; padding:4px 8px; color:white;">
                <option value="pending" ${step.status==='pending'?'selected':''}>Pendente</option>
                <option value="progress" ${step.status==='progress'?'selected':''}>Em Andamento</option>
                <option value="completed" ${step.status==='completed'?'selected':''}>Concluída</option>
            </select>`;
            
            div.innerHTML = `
                <div class="step-header">
                    <span>${isCompleted ? '✅' : (isCurrent ? '▶' : '🔒')} Etapa ${idx+1}</span>
                    ${statusSelect}
                </div>
                <div><strong>${escapeHtml(step.name)}</strong></div>
                <div style="font-size:0.75rem; color:#00ccff; margin-top:8px;">📅 ${step.dueDate || 'Sem data'}</div>
            `;
            stepsList.appendChild(div);
        });
        
        document.querySelectorAll('.step-status').forEach(select => {
            select.onchange = async (e) => {
                const idx = parseInt(select.dataset.idx);
                await updateStepStatus(idx, select.value);
            };
        });
    }

    async function updateStepStatus(stepIdx, newStatus) {
        if(!currentWorkflowId) return;
        const wf = workflows.find(w => w.id === currentWorkflowId);
        if(!wf) return;
        
        wf.steps[stepIdx].status = newStatus;
        if(newStatus === 'completed' && stepIdx === wf.currentIdx) {
            wf.currentIdx++;
            if(wf.currentIdx >= wf.steps.length) wf.currentIdx = wf.steps.length;
        }
        
        await db.collection('workflows').doc(currentWorkflowId).update({
            steps: wf.steps,
            currentIdx: wf.currentIdx
        });
        
        // Atualizar local
        const index = workflows.findIndex(w => w.id === currentWorkflowId);
        workflows[index] = wf;
        renderSteps(wf.steps, wf.currentIdx);
        updateStats();
    }

    async function loadWorkflows() {
        if(!currentUser) return;
        const snapshot = await db.collection('workflows').where('userId', '==', currentUser.uid).orderBy('createdAt', 'desc').get();
        workflows = [];
        snapshot.forEach(doc => {
            workflows.push({ id: doc.id, ...doc.data() });
        });
        renderWorkflows();
        if(currentWorkflowId && !workflows.find(w => w.id === currentWorkflowId)) {
            currentWorkflowId = null;
            stepsSection.classList.add('hidden');
        }
    }

    // ========== EVENTOS ==========
    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
            showMsg(document.getElementById('authMsg'), '✅ Login realizado!', false);
        } catch(e) { showMsg(document.getElementById('authMsg'), '❌ '+e.message); }
    };

    document.getElementById('btnReg').onclick = async () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pwd = document.getElementById('regPass').value;
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pwd);
            await cred.user.updateProfile({ displayName: name });
            await db.collection('users').doc(cred.user.uid).set({ name, email });
            showMsg(document.getElementById('authMsg'), '✅ Conta criada! Faça login.', false);
            document.getElementById('regPanel').classList.add('hidden');
            document.getElementById('loginPanel').classList.remove('hidden');
        } catch(e) { showMsg(document.getElementById('authMsg'), '❌ '+e.message); }
    };

    document.getElementById('showReg').onclick = () => {
        document.getElementById('loginPanel').classList.add('hidden');
        document.getElementById('regPanel').classList.remove('hidden');
    };
    document.getElementById('backLogin').onclick = () => {
        document.getElementById('regPanel').classList.add('hidden');
        document.getElementById('loginPanel').classList.remove('hidden');
    };
    document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); };

    document.getElementById('createWorkflowBtn').onclick = async () => {
        const name = document.getElementById('newWorkflowName').value.trim();
        if(!name) { alert('Digite um nome'); return; }
        await db.collection('workflows').add({
            userId: currentUser.uid,
            name: name,
            steps: [],
            currentIdx: 0,
            createdAt: new Date()
        });
        document.getElementById('newWorkflowName').value = '';
        await loadWorkflows();
    };

    document.getElementById('addStepBtn').onclick = async () => {
        const name = document.getElementById('newStepName').value.trim();
        const dueDate = document.getElementById('stepDate').value;
        if(!name) { alert('Digite o nome da etapa'); return; }
        if(!currentWorkflowId) { alert('Selecione um workflow'); return; }
        
        const wf = workflows.find(w => w.id === currentWorkflowId);
        if(!wf) return;
        
        wf.steps.push({ name, dueDate, status: 'pending' });
        await db.collection('workflows').doc(currentWorkflowId).update({
            steps: wf.steps,
            currentIdx: wf.currentIdx
        });
        
        document.getElementById('newStepName').value = '';
        document.getElementById('stepDate').value = '';
        await loadWorkflows();
        await selectWorkflow(currentWorkflowId);
    };

    document.getElementById('deleteWorkflowBtn').onclick = async () => {
        if(!currentWorkflowId) { alert('Selecione um workflow'); return; }
        if(confirm('Excluir este workflow?')) {
            await db.collection('workflows').doc(currentWorkflowId).delete();
            currentWorkflowId = null;
            stepsSection.classList.add('hidden');
            await loadWorkflows();
        }
    };

    document.getElementById('deleteAllWorkflowsBtn').onclick = async () => {
        if(confirm('Excluir TODOS os workflows?')) {
            for(const wf of workflows) {
                await db.collection('workflows').doc(wf.id).delete();
            }
            currentWorkflowId = null;
            stepsSection.classList.add('hidden');
            await loadWorkflows();
            alert('Todos workflows excluídos');
        }
    };

    document.getElementById('deleteAccountBtn').onclick = async () => {
        if(confirm('Excluir sua conta e TODOS os dados?')) {
            for(const wf of workflows) {
                await db.collection('workflows').doc(wf.id).delete();
            }
            await db.collection('users').doc(currentUser.uid).delete();
            await currentUser.delete();
            alert('Conta excluída');
            window.location.reload();
        }
    };

    document.getElementById('changePasswordBtn').onclick = async () => {
        const old = document.getElementById('oldPassword').value;
        const newPwd = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if(newPwd.length < 6) { alert('Nova senha mínimo 6'); return; }
        if(newPwd !== confirm) { alert('Senhas não conferem'); return; }
        try {
            const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, old);
            await currentUser.reauthenticateWithCredential(cred);
            await currentUser.updatePassword(newPwd);
            alert('Senha alterada!');
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        } catch(e) { alert('Erro: '+e.message); }
    };

    document.getElementById('openSettingsBtn').onclick = () => {
        document.getElementById('settingsModal').style.display = 'flex';
    };
    document.getElementById('closeSettingsBtn').onclick = () => {
        document.getElementById('settingsModal').style.display = 'none';
    };
    window.onclick = (e) => { if(e.target === document.getElementById('settingsModal')) document.getElementById('settingsModal').style.display = 'none'; };

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            userNameSpan.innerText = doc.data()?.name || user.email;
            await loadWorkflows();
            loginView.classList.add('hidden');
            mainView.classList.remove('hidden');
            stepsSection.classList.add('hidden');
            currentWorkflowId = null;
        } else {
            currentUser = null;
            loginView.classList.remove('hidden');
            mainView.classList.add('hidden');
            document.getElementById('loginPanel').classList.remove('hidden');
            document.getElementById('regPanel').classList.add('hidden');
        }
    });
</script>
</body>
</html>
